services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-corehr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_please}
      POSTGRES_DB: ${POSTGRES_DB:-corehr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-corehr} -d ${POSTGRES_DB:-corehr}"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot: creates/updates the database schema, then exits.
  migrate:
    build:
      context: .
      target: builder
    command: ["npm", "run", "db:push"]
    environment:
      DATABASE_DRIVER: pg
      DATABASE_URL: postgres://${POSTGRES_USER:-corehr}:${POSTGRES_PASSWORD:-change_me_please}@db:5432/${POSTGRES_DB:-corehr}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      # Use the standard PostgreSQL driver to talk to the bundled `db` service.
      DATABASE_DRIVER: pg
      DATABASE_URL: postgres://${POSTGRES_USER:-corehr}:${POSTGRES_PASSWORD:-change_me_please}@db:5432/${POSTGRES_DB:-corehr}
    ports:
      - "${APP_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
